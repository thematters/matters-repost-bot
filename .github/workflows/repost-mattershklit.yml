name: Repost p-articles to @mattershklit

on:
  schedule:
    # Mon & Thu 06:00 Hong Kong time (UTC+8). HKT 06:00 = UTC 22:00 previous day.
    # Sun 22:00 UTC = Mon 06:00 HKT; Wed 22:00 UTC = Thu 06:00 HKT.
    # Off-peak UTC reduces GHA scheduler delay (top-of-hour UTC is heavily oversubscribed).
    - cron: "0 22 * * 0,3"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't post to Matters)"
        required: false
        default: "false"
      bootstrap:
        description: "Bootstrap state only (record current refs, post nothing)"
        required: false
        default: "false"
      publish:
        description: "Publish immediately instead of leaving as drafts"
        required: false
        default: "false"

permissions:
  contents: write

env:
  SOURCE: p_articles
  STATE_FILE: state/mattershklit.json

jobs:
  repost:
    runs-on: ubuntu-latest
    # 6 hours: accommodates auto-publish runs that sleep 30 min between
    # articles (10 articles is about 5 hours). Public-repo GHA minutes are unlimited
    # so the longer ceiling is free.
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run repost bot
        env:
          MATTERS_EMAIL: ${{ secrets.MATTERS_EMAIL }}
          MATTERS_PASSWORD: ${{ secrets.MATTERS_PASSWORD }}
        run: |
          ARGS="--source $SOURCE --state $STATE_FILE"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.bootstrap }}" = "true" ]; then ARGS="$ARGS --bootstrap"; fi
          if [ "${{ github.event.inputs.publish }}" = "true" ]; then ARGS="$ARGS --publish"; fi
          python -m bot.main $ARGS

      - name: Commit updated state
        run: |
          if [ ! -f "$STATE_FILE" ]; then
            echo "$STATE_FILE was not produced; nothing to commit"
            exit 0
          fi
          git add "$STATE_FILE"
          # --cached catches both new and modified files; plain `git diff` misses new files.
          if git diff --cached --quiet -- "$STATE_FILE"; then
            echo "$STATE_FILE unchanged"
            exit 0
          fi
          git config user.name "repost-bot"
          git config user.email "repost-bot@users.noreply.github.com"
          git commit -m "chore: update $SOURCE state ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          # Retry on parallel-workflow push race: pull --rebase then re-push.
          for attempt in 1 2 3; do
            if git push; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt rejected; rebasing onto latest origin/main"
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          echo "push failed after 3 attempts"
          exit 1
